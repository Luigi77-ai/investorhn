<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestorHN - Marketplace de Propiedades de Inversión en Honduras</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <div class="logo">
      <div class="logo-name">InvestorHN</div>
      <span class="logo-sub">Propiedades de Inversión</span>
    </div>
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="Buscar por ciudad, colonia o tipo...">
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Marketplace</a>
      <a href="#" class="nav-link">Publicar Deal</a>
      <a href="#" class="nav-link">Mi Buy Box</a>
    </div>
    <div class="nav-actions">
      <button class="btn-currency active" onclick="toggleCurrency('lps')">LPS</button>
      <button class="btn-currency" onclick="toggleCurrency('usd')">USD</button>
      <button class="btn-favorites" onclick="toggleFavoritesView()" title="Mis Favoritos">&#9825; <span id="favCount">0</span></button>
    </div>
  </div>
</nav>

<div id="favoritesPanel" class="favorites-panel" style="display:none">
  <div class="fav-header"><h2>&#10084; Mis Favoritos</h2><button onclick="toggleFavoritesView()">&#10005; Cerrar</button></div>
  <div id="favoritesList" class="properties-list"></div>
</div>

<div class="main-layout">
  <div class="map-panel">
    <div id="map" style="height:100%;width:100%;"></div>
    <div class="map-tabs">
      <button class="map-tab active">Mapa</button>
      <button class="map-tab">Lista</button>
    </div>
  </div>

  <div class="list-panel">
    <div class="filters-bar">
      <div class="filters-top">
        <div class="filter-group">
          <label>Ciudad</label>
          <select class="f-select" id="filterCiudad">
            <option value="">Todas las Ciudades</option>
            <option value="Tegucigalpa">Tegucigalpa</option>
            <option value="San Pedro Sula">San Pedro Sula</option>
            <option value="La Ceiba">La Ceiba</option>
            <option value="Roatan">Roatan</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Tipo de Propiedad</label>
          <select class="f-select" id="filterTipo">
            <option value="">Todos los Tipos</option>
            <option value="Casa">Casa</option>
            <option value="Condominio">Condominio</option>
            <option value="Apartamento">Apartamento</option>
            <option value="Terreno">Terreno</option>
            <option value="Townhouse">Townhouse</option>
            <option value="Oficina">Oficina</option>
            <option value="Edificio">Edificio</option>
          </select>
        </div>
        <div class="filter-group price-range">
          <label>Precio Capital (LPS)</label>
          <div class="price-inputs">
            <input type="number" id="precioMin" placeholder="Mínimo" class="price-input">
            <span>-</span>
            <input type="number" id="precioMax" placeholder="Máximo" class="price-input">
          </div>
        </div>
        <div class="filter-group">
          <label>Estado</label>
          <select class="f-select" id="filterEstado">
            <option value="">Todos los Estados</option>
            <option value="EN VENTA">En Venta</option>
            <option value="SUBASTA">Subasta</option>
            <option value="BANCO">Propiedad del Banco</option>
          </select>
        </div>
        <button class="btn-search" onclick="renderProperties(filtrarPropiedades())">&#128269; Buscar</button>
      </div>
      <div class="filters-bottom">
        <div class="results-count"><strong id="resultCount">0</strong> propiedades</div>
        <select class="sort-select" id="sortBy">
          <option value="recientes">Más recientes</option>
          <option value="precio-asc">Precio: menor a mayor</option>
          <option value="precio-desc">Precio: mayor a menor</option>
        </select>
      </div>
    </div>

    <div class="properties-list" id="propertiesList"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script>
let map = L.map('map').setView([14.1, -87.2], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markers = L.layerGroup().addTo(map);
let monedaActual = 'lps';
let favoritos = JSON.parse(localStorage.getItem('favoritos') || '[]');

function updateFavCount() {
  document.getElementById('favCount').textContent = favoritos.length;
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favoritos.indexOf(id);
  if (idx === -1) favoritos.push(id);
  else favoritos.splice(idx, 1);
  localStorage.setItem('favoritos', JSON.stringify(favoritos));
  updateFavCount();
  renderProperties(filtrarPropiedades());
}

function toggleFavoritesView() {
  const panel = document.getElementById('favoritesPanel');
  if (panel.style.display === 'none') {
    panel.style.display = 'flex';
    const favProps = propiedades.filter(p => favoritos.includes(p.id));
    renderToContainer(favProps, document.getElementById('favoritesList'));
  } else {
    panel.style.display = 'none';
  }
}

function renderMarkers(props) {
  markers.clearLayers();
  props.forEach(p => {
    if (p.lat && p.lng) {
      L.marker([p.lat, p.lng]).addTo(markers)
        .bindPopup(`<b>${p.titulo}</b><br>${p.ciudad}<br><a href="deal.html?id=${p.id}">Ver detalles</a>`);
    }
  });
}

function toggleCurrency(currency) {
  monedaActual = currency;
  document.querySelectorAll('.btn-currency').forEach(btn => btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === currency));
  renderProperties(filtrarPropiedades());
}

function formatNumber(num) {
  return new Intl.NumberFormat('es-HN').format(num);
}

function getStatusClass(status) {
  if (!status) return '';
  const s = status.toUpperCase();
  if (s.includes('VENTA')) return 'status-venta';
  if (s.includes('SUBASTA')) return 'status-subasta';
  if (s.includes('BANCO')) return 'status-banco';
  return 'status-venta';
}

function filtrarPropiedades() {
  const ciudad = document.getElementById('filterCiudad').value;
  const tipo = document.getElementById('filterTipo').value;
  const estado = document.getElementById('filterEstado').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  const precioMin = parseFloat(document.getElementById('precioMin').value) || 0;
  const precioMax = parseFloat(document.getElementById('precioMax').value) || Infinity;
  const sortBy = document.getElementById('sortBy').value;

  let result = propiedades.filter(p => {
    if (ciudad && p.ciudad !== ciudad) return false;
    if (tipo && p.tipo !== tipo) return false;
    if (estado && p.status !== estado) return false;
    if (search && !(p.titulo.toLowerCase().includes(search) || p.ciudad.toLowerCase().includes(search) || (p.colonia && p.colonia.toLowerCase().includes(search)))) return false;
    const precio = monedaActual === 'lps' ? p.preciolps : p.preciousd;
    if (precio < precioMin || precio > precioMax) return false;
    return true;
  });

  if (sortBy === 'precio-asc') result.sort((a, b) => a.preciolps - b.preciolps);
  else if (sortBy === 'precio-desc') result.sort((a, b) => b.preciolps - a.preciolps);

  return result;
}

function renderToContainer(props, container) {
  container.innerHTML = props.map(p => {
    const precio = monedaActual === 'lps' ? `L. ${formatNumber(p.preciolps)}` : `$ ${formatNumber(p.preciousd)}`;
    const isFav = favoritos.includes(p.id);
    const statusLabel = p.status || 'EN VENTA';
    return `
    <div class="property-card" onclick="window.location.href='deal.html?id=${p.id}'">
      <div class="card-img" style="background-image:url('${p.imgs && p.imgs[0] ? p.imgs[0] : p.img}')">
        <span class="status-badge ${getStatusClass(statusLabel)}">${statusLabel}</span>
        <button class="heart-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${p.id}, event)" title="Guardar favorito">&#9825;</button>
      </div>
      <div class="card-content">
        <h3 class="card-title">${p.titulo}</h3>
        <p class="card-address">${p.ciudad}, ${p.departamento}</p>
        <div class="card-specs">
          ${p.habitaciones ? `<span>&#127968; ${p.habitaciones} cuartos</span>` : ''}
          ${p.banos ? `<span>&#128703; ${p.banos} baños</span>` : ''}
          ${p.metros ? `<span>&#9635; ${p.metros} m²</span>` : ''}
        </div>
        <div class="card-pricing">
          <span class="price">${precio}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderProperties(props) {
  document.getElementById('resultCount').textContent = props.length;
  renderMarkers(props);
  renderToContainer(props, document.getElementById('propertiesList'));
}

document.getElementById('filterCiudad').addEventListener('change', () => renderProperties(filtrarPropiedades()));
document.getElementById('filterTipo').addEventListener('change', () => renderProperties(filtrarPropiedades()));
document.getElementById('filterEstado').addEventListener('change', () => renderProperties(filtrarPropiedades()));
document.getElementById('searchInput').addEventListener('input', () => renderProperties(filtrarPropiedades()));
document.getElementById('sortBy').addEventListener('change', () => renderProperties(filtrarPropiedades()));

updateFavCount();
renderProperties(propiedades);
</script>
</body>
</html>
